version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: bank-postgres
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5432:5432"
    volumes:
      - ./db-init.sql:/docker-entrypoint-initdb.d/db-init.sql

  bank-service:
    build: ./bank-service
    container_name: bank-service
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankdb
      SPRING_DATASOURCE_USERNAME: bank
      SPRING_DATASOURCE_PASSWORD: bank
    ports:
      - "8080:8080"

  report-service:
    build: ./report-service
    container_name: report-service
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankdb
      SPRING_DATASOURCE_USERNAME: bank
      SPRING_DATASOURCE_PASSWORD: bank
    ports:
      - "8081:8081"

  bank-ui:
    build: ./bank-ui
    container_name: bank-ui
    depends_on:
      - bank-service
    ports:
      - "4200:80"