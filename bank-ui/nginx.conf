server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;   # Must match where Angular is copied
    index index.html;

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }


    # API calls for bank-service
    location /api/v1/clientes/ {
        proxy_pass http://bank-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/cuentas/ {
        proxy_pass http://bank-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/movimientos/ {
        proxy_pass http://bank-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API calls for report-service
    location /api/v1/reportes/ {
        proxy_pass http://report-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
